server {
    # El puerto se inyecta desde la variable PORT en tiempo de ejecución
    # (Render/Cloud Run la definen; en local vale 80). Nginx la resuelve vía
    # envsubst sobre este archivo .template antes de arrancar.
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enrutamiento SPA: cualquier ruta desconocida cae en index.html para que
    # el router de Angular resuelva /eventos, /admin/eventos, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché larga para los assets con hash de contenido.
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
