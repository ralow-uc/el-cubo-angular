<main>
  <div class="container">
    <header class="form-page-head">
      <span class="eyebrow">Historial</span>
      <h1>Mis pedidos</h1>
      <p>Aquí están todas las compras que has realizado en El Cubo.</p>
    </header>

    <section *ngIf="orders.length > 0; else empty" class="orders-list">
      <article *ngFor="let o of orders" class="order-card">
        <header class="order-card-head">
          <div>
            <span class="eyebrow">{{ o.id }}</span>
            <h3>{{ formatDate(o.createdAt) }}</h3>
          </div>
          <strong class="order-total">{{ formatCLP(o.total) }}</strong>
        </header>
        <ul class="order-items">
          <li *ngFor="let it of o.items">
            <span>{{ it.name }} <em>× {{ it.qty }}</em></span>
            <strong>{{ formatCLP(it.subtotal) }}</strong>
          </li>
        </ul>
      </article>
    </section>

    <ng-template #empty>
      <div class="empty-state">
        <h2>Aún no tienes pedidos</h2>
        <p>Cuando completes una compra, aparecerá acá.</p>
        <a class="btn btn-primary" [routerLink]="['/']">Ir al catálogo</a>
      </div>
    </ng-template>
  </div>
</main>
